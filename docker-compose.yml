services:
  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    environment: &app-environment
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: salesreport
      DB_USERNAME: salesreport
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
    depends_on:
      db:
        condition: service_healthy
    command: ["php", "artisan", "migrate", "--force", "--no-interaction"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "php", "-r", "$connection = @fsockopen('127.0.0.1', 9000); exit($connection ? 0 : 1);"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    command: ["php", "artisan", "queue:work", "--tries=1", "--no-interaction"]
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "8000:80"
    depends_on:
      app:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salesreport
      POSTGRES_USER: salesreport
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
