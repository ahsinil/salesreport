services:
  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    environment: &app-environment
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: ${DOCKER_DB_HOST:-mysql}
      DB_PORT: ${DOCKER_DB_PORT:-3306}
      DB_DATABASE: ${DOCKER_DB_DATABASE:-salesreport}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-ahsinil}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-theSecret1.}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
    networks:
      - internal
    command: ["php", "artisan", "migrate", "--force", "--no-interaction"]
    restart: "no"

  salesreport-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: salesreport-app
    environment: *app-environment
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "$connection = @fsockopen('127.0.0.1', 9000); exit($connection ? 0 : 1);",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    environment: *app-environment
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - internal
    command: ["php", "artisan", "queue:work", "--tries=1", "--no-interaction"]
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: salesreport-nginx
    ports:
      - "8000:80"
    depends_on:
      salesreport-app:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    external: true
    name: ${DOCKER_SHARED_NETWORK:-internal}
